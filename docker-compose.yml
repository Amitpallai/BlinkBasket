version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: grocery-mart-backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BACKEND_URL: http://localhost:4000
    container_name: grocery-mart-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
